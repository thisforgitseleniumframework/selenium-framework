name: Maven Selenium Tests

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST (UTC+5:30) = 05:30 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build and run tests
        id: run_tests
        run: |
          mvn clean test \
            -Dheadless=true \
            -Dsurefire.failIfNoSpecifiedTests=false \
            2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: results
        if: always()
        run: |
          TOTAL=$(grep -oP 'Total Executed\s*:\s*\K[0-9]+' test-output.log || echo "0")
          PASSED=$(grep -oP 'Passed\s*:\s*\K[0-9]+' test-output.log || echo "0")
          FAILED=$(grep -oP 'Failed\s*:\s*\K[0-9]+' test-output.log || echo "0")
          SKIPPED=$(grep -oP 'Skipped\s*:\s*\K[0-9]+' test-output.log || echo "0")
          RATE=$(grep -oP 'Pass Rate\s*:\s*\K[0-9.]+%' test-output.log || echo "N/A")
          BUILD=$(grep -oP '(BUILD SUCCESS|BUILD FAILURE)' test-output.log | tail -1 || echo "UNKNOWN")
          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "rate=$RATE"       >> $GITHUB_OUTPUT
          echo "build=$BUILD"     >> $GITHUB_OUTPUT

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ExtentReport-${{ github.run_number }}
          path: target/ExtentReport.html
          retention-days: 30

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SurefireReports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "## Selenium Automation Suite — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | ${{ steps.results.outputs.build }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Executed** | ${{ steps.results.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | ${{ steps.results.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | ${{ steps.results.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Skipped** | ${{ steps.results.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pass Rate** | ${{ steps.results.outputs.rate }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Extent Report and Surefire Reports are available in the **Artifacts** section above (retained 30 days)." >> $GITHUB_STEP_SUMMARY
