name: Maven Selenium Tests

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST (UTC+5:30) = 05:30 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build and run tests
        id: run_tests
        run: |
          mvn clean test \
            -Dheadless=true \
            -Dsurefire.failIfNoSpecifiedTests=false \
            2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: results
        if: always()
        run: |
          TOTAL=$(grep -m 1 -oP 'Total Executed\s*:\s*\K[0-9]+' test-output.log || echo "0")
          PASSED=$(grep -m 1 -oP 'Passed\s*:\s*\K[0-9]+' test-output.log || echo "0")
          FAILED=$(grep -m 1 -oP 'Failed\s*:\s*\K[0-9]+' test-output.log || echo "0")
          SKIPPED=$(grep -m 1 -oP 'Skipped\s*:\s*\K[0-9]+' test-output.log || echo "0")
          RATE=$(grep -m 1 -oP 'Pass Rate\s*:\s*\K[0-9.]+%' test-output.log || echo "N/A")
          BUILD=$(grep -oP '(BUILD SUCCESS|BUILD FAILURE)' test-output.log | tail -1 || echo "UNKNOWN")
          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "rate=$RATE"       >> $GITHUB_OUTPUT
          echo "build=$BUILD"     >> $GITHUB_OUTPUT

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ExtentReport-${{ github.run_number }}
          path: target/ExtentReport.html
          retention-days: 30

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SurefireReports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "## Selenium Automation Suite — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | ${{ steps.results.outputs.build }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Executed** | ${{ steps.results.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | ${{ steps.results.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | ${{ steps.results.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Skipped** | ${{ steps.results.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pass Rate** | ${{ steps.results.outputs.rate }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Extent Report and Surefire Reports are available in the **Artifacts** section above (retained 30 days)." >> $GITHUB_STEP_SUMMARY

      - name: Send email notification to stakeholders
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false                       # uses STARTTLS on port 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: >-
            [${{ steps.results.outputs.build }}] OrangeHRM Automation Suite
            — Run #${{ github.run_number }}
            (${{ steps.results.outputs.passed }}P /
             ${{ steps.results.outputs.failed }}F /
             ${{ steps.results.outputs.skipped }}S)
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: OrangeHRM Automation <${{ secrets.SMTP_USERNAME }}>
          html_body: |
            <html>
            <body style="font-family:Arial,sans-serif;font-size:14px;color:#333;">

              <h2 style="margin-bottom:4px;">OrangeHRM Automation Suite</h2>
              <p style="margin-top:0;color:#666;">
                Run #${{ github.run_number }} &nbsp;|&nbsp;
                Trigger: <b>${{ github.event_name }}</b> &nbsp;|&nbsp;
                Branch: <b>${{ github.ref_name }}</b>
              </p>

              <table border="1" cellpadding="8" cellspacing="0"
                     style="border-collapse:collapse;min-width:320px;">
                <thead>
                  <tr style="background:#333;color:#fff;">
                    <th style="text-align:left;">Metric</th>
                    <th style="text-align:left;">Value</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><b>Build Status</b></td>
                    <td>
                      ${{ steps.results.outputs.build == 'BUILD SUCCESS'
                          && '<span style="color:green;font-weight:bold;">BUILD SUCCESS</span>'
                          ||  '<span style="color:red;font-weight:bold;">BUILD FAILURE</span>' }}
                    </td>
                  </tr>
                  <tr style="background:#f9f9f9;">
                    <td><b>Total Executed</b></td>
                    <td>${{ steps.results.outputs.total }}</td>
                  </tr>
                  <tr>
                    <td><b>Passed</b></td>
                    <td style="color:green;font-weight:bold;">
                      ${{ steps.results.outputs.passed }}
                    </td>
                  </tr>
                  <tr style="background:#f9f9f9;">
                    <td><b>Failed</b></td>
                    <td style="color:${{ steps.results.outputs.failed != '0'
                                         && 'red' || 'inherit' }};font-weight:bold;">
                      ${{ steps.results.outputs.failed }}
                    </td>
                  </tr>
                  <tr>
                    <td><b>Skipped</b></td>
                    <td>${{ steps.results.outputs.skipped }}</td>
                  </tr>
                  <tr style="background:#f9f9f9;">
                    <td><b>Pass Rate</b></td>
                    <td><b>${{ steps.results.outputs.rate }}</b></td>
                  </tr>
                </tbody>
              </table>

              <p style="margin-top:20px;">
                <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                   style="background:#0366d6;color:#fff;padding:8px 16px;
                          text-decoration:none;border-radius:4px;">
                  View Full Run on GitHub
                </a>
              </p>

              <p style="color:#999;font-size:12px;margin-top:24px;">
                The Extent Report is attached to this email.<br>
                It is also available as a downloadable artifact on the GitHub Actions run page
                for 30 days.
              </p>

            </body>
            </html>
          attachments: target/ExtentReport.html
